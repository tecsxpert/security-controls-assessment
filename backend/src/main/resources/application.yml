server:
  port: 8080

# ── Database (PostgreSQL) ─────────────────────────────────────────────────────
# All values come from .env — no defaults to avoid leaking config in public repo
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA ────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema — never let Hibernate touch it
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ── Flyway ─────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ──────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms

  # ── Cache ──────────────────────────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes (600 000 ms) for general GETs
      cache-null-values: false

  # ── Email (JavaMailSender) ─────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ── Async (for @Async AI calls) ────────────────────────────────────────────
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: tool53-async-

  # ── Thymeleaf (email templates) ────────────────────────────────────────────
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

# ── JWT ────────────────────────────────────────────────────────────────────────
# No defaults — must be explicitly set in .env
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}

# ── AI Microservice ────────────────────────────────────────────────────────────
# url field required by AiServiceClient.java (AI Developer 3 — PR #26)
# base-url kept for backward compatibility
ai:
  service:
    url: ${AI_SERVICE_URL:http://ai-service:5000}
    base-url: ${AI_SERVICE_URL:http://ai-service:5000}
ai:
  service:
    base-url: ${AI_SERVICE_URL}
    timeout-seconds: 10

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
# Swagger requires JWT authentication — see SecurityConfig.java
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.internship.tool: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ── App-specific ──────────────────────────────────────────────────────────────
app:
  name: Tool-53 Security Controls Assessment
  mail:
    from: ${MAIL_FROM}
  file-upload:
    max-size-bytes: 10485760      # 10 MB
    allowed-types: application/pdf,image/png,image/jpeg,text/plain
